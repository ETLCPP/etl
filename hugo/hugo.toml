baseURL = 'http://localhost/'
languageCode = 'en-gb'
title = 'Embedded Template Library'
theme = 'hextra'

[markup]
  [markup.highlight]
    style = "perldoc"

  [markup.goldmark.renderer]
    unsafe = true

[module]
  [[module.mounts]]
    source = "../docs"
    target = "content/docs"

[params]
  [params.theme]
    customCSS = ["css/custom.css"]

  contentDir = "content/docs"
