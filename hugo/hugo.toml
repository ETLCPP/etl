baseURL = 'http://localhost/'
#baseURL = 'https://www.etlcpp.com/hugo/'
languageCode = 'en-gb'
title = 'Embedded Template Library'
theme = 'hextra'

[markup]
  [markup.highlight]
    noClasses = false
    style = "plaintext"
    codeFences = false

  [markup.goldmark.renderer]
    unsafe = true

[module]
  [[module.mounts]]
    source = "../docs"
    target = "content/docs"

[params]
  contentDir = "content/docs"
  
  [params.theme]
    customCSS = ["css/custom.css"]

  [params.navbar]
    displayTitle = true
    [params.navbar.logo]
      path = "images/logo.png"
      link = "/"
